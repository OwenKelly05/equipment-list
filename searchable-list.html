<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #16181d;
      --panel: #1f2128;
      --panel-2: #2a2d36;
      --accent: #5b8def;
      --muted: #8b8f9a;
      --line: #eceef1;
      --bg: #eef0f3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: #fff;
      padding: 14px 14px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      margin-bottom: 12px;
      color: #fff;
    }

    .zone-toggle {
      display: flex;
      background: var(--panel);
      border-radius: 9px;
      padding: 3px;
      gap: 3px;
      margin-bottom: 9px;
    }

    .zone-toggle button {
      flex: 1;
      padding: 9px 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .zone-toggle button.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 1px 4px rgba(91,141,239,0.4);
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    input[type="text"], select {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      background: var(--panel);
      color: #fff;
      outline: none;
      min-width: 0;
    }

    input[type="text"] { flex: 1; }
    input[type="text"]::placeholder { color: var(--muted); }
    select { flex: 0 0 122px; font-weight: 600; }
    select option { background: var(--panel); }

    #results-count {
      font-size: 11px;
      color: var(--muted);
      padding: 9px 2px 1px;
      letter-spacing: 0.2px;
    }

    /* ── List ── */
    .list {
      padding: 10px 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(20,24,35,0.07);
      display: flex;
      overflow: hidden;
    }

    /* Left rail: the drawer — the answer */
    .drawer {
      background: var(--ink);
      color: #fff;
      width: 58px;
      min-width: 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
    }

    .drawer::after {
      content: "";
      position: absolute;
      right: 0; top: 12%;
      height: 76%;
      width: 3px;
      background: var(--accent);
      border-radius: 3px;
    }

    .drawer-label {
      font-size: 7.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
    }

    .drawer-number {
      font-size: 30px;
      font-weight: 800;
      line-height: 0.9;
    }

    /* Right body */
    .body {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Row 1: connection (from -> to) + system badge */
    .conn-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .conn {
      min-width: 0;
      flex: 1;
      display: grid;
      grid-template-columns: 28px 1fr;
      row-gap: 2px;
      column-gap: 7px;
      align-items: baseline;
    }

    .conn-tag {
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      padding-top: 2px;
    }

    .conn-from {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }

    .conn-to {
      font-size: 13px;
      font-weight: 500;
      color: #5c606b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }

    .badge-AC      { background: #e3edff; color: #1d4ed8; }
    .badge-Control { background: #efe8ff; color: #6d28d9; }
    .badge-DC      { background: #fef0d4; color: #b45309; }
    .badge-Modbus  { background: #d6f5e3; color: #047857; }
    .badge-MV      { background: #ffe1e1; color: #be123c; }

    /* Row 2: packet */
    .packet {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-top: 7px;
      border-top: 1px solid var(--line);
    }

    .packet-tag {
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .packet-name {
      font-size: 11.5px;
      font-weight: 600;
      color: #3a3e48;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>Equipment List</h1>
  <div class="zone-toggle">
    <button class="active" data-zone="EYD Zone 1">EYD Zone 1</button>
    <button data-zone="EYD Zone 2">EYD Zone 2</button>
    <button data-zone="MYD">MYD</button>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search source or destination..." />
    <select id="filter">
      <option value="">All Systems</option>
      <option value="AC">AC</option>
      <option value="Control">Control</option>
      <option value="DC">DC</option>
      <option value="Modbus">Modbus</option>
      <option value="MV">MV</option>
    </select>
  </div>
  <div id="results-count"></div>
</header>

<div class="list" id="list"></div>

<script>
  // ─── YOUR DATA GOES HERE ───────────────────────────────────────────────────
  const DATA = [
    { source: "USS-RMU-SWGR-3",   dest: "PDC-RMU-3",        system: "AC",      zone: "EYD Zone 1", drawer: 1, packet: "EY06-ELEC-XFMR-A to SSS-A-BDC" },
    { source: "MDP-A",             dest: "UPS-1A",           system: "DC",      zone: "EYD Zone 1", drawer: 3, packet: "EY06-ELEC-XFMR-B to SSS-B-BDC" },
    { source: "ATS-1",             dest: "SWGR-B",           system: "Control", zone: "EYD Zone 2", drawer: 2, packet: "EY06-CTRL-ATS-1 to SWGR-B" },
    { source: "GEN-1",             dest: "ATS-2",            system: "AC",      zone: "MYD",        drawer: 5, packet: "MY01-ELEC-GEN-1 to ATS-2" },
    { source: "PDU-3",             dest: "SERVER-RACK-14",   system: "DC",      zone: "EYD Zone 2", drawer: 4, packet: "EY06-DC-PDU-3 to RACK-14" },
    { source: "AHU-1",             dest: "VAV-BOX-3A",       system: "Control", zone: "EYD Zone 1", drawer: 2, packet: "EY06-CTRL-AHU-1 to VAV-3A" },
    { source: "CHILLER-A",         dest: "AHU-2",            system: "Modbus",  zone: "MYD",        drawer: 6, packet: "MY01-MOD-CHILLER-A to AHU-2" },
    { source: "COOLING-TOWER-2",   dest: "CHILLER-B",        system: "Modbus",  zone: "MYD",        drawer: 6, packet: "MY01-MOD-CT2 to CHILLER-B" },
    { source: "CRAC-4",            dest: "PLENUM-ZONE-2",    system: "AC",      zone: "EYD Zone 2", drawer: 1, packet: "EY06-ELEC-CRAC-4 to PLEN-2" },
    { source: "SWGR-MV-1",         dest: "XFMR-A",          system: "MV",      zone: "EYD Zone 1", drawer: 2, packet: "EY06-MV-SWGR1 to XFMR-A" },
    { source: "CHW-PUMP-A",        dest: "AHU-1",            system: "Control", zone: "MYD",        drawer: 7, packet: "MY01-CTRL-CHWP-A to AHU-1" },
    { source: "CDW-PUMP-B",        dest: "COOLING-TOWER-1",  system: "Modbus",  zone: "EYD Zone 1", drawer: 4, packet: "EY06-MOD-CDWP-B to CT1" },
    { source: "XFMR-MV-2",         dest: "MDP-B",           system: "MV",      zone: "EYD Zone 2", drawer: 3, packet: "EY06-MV-XFMR-2 to MDP-B" },
    { source: "BMS-CTRL-1",        dest: "IDF-NODE-A",       system: "Control", zone: "EYD Zone 1", drawer: 8, packet: "EY06-CTRL-BMS1 to IDF-A" },
    { source: "SENSOR-ZONE-3",     dest: "BMS-CTRL-2",       system: "Modbus",  zone: "EYD Zone 2", drawer: 5, packet: "EY06-MOD-SZ3 to BMS-2" },
    { source: "EPMS-MON",          dest: "MDP-A",            system: "DC",      zone: "MYD",        drawer: 8, packet: "MY01-DC-EPMS to MDP-A" },
  ];
  // ──────────────────────────────────────────────────────────────────────────

  const badgeClass = {
    AC: "badge-AC", Control: "badge-Control", DC: "badge-DC",
    Modbus: "badge-Modbus", MV: "badge-MV",
  };

  const listEl      = document.getElementById("list");
  const searchEl    = document.getElementById("search");
  const filterEl    = document.getElementById("filter");
  const countEl     = document.getElementById("results-count");
  const zoneButtons = document.querySelectorAll(".zone-toggle button");

  let activeZone = "EYD Zone 1";

  zoneButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      activeZone = btn.dataset.zone;
      zoneButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function render() {
    const query  = searchEl.value.toLowerCase().trim();
    const system = filterEl.value;

    const filtered = DATA.filter(item => {
      const matchesSearch =
        !query ||
        item.source.toLowerCase().includes(query) ||
        item.dest.toLowerCase().includes(query) ||
        item.packet.toLowerCase().includes(query);
      const matchesSystem = !system || item.system === system;
      const matchesZone   = item.zone === activeZone;
      return matchesSearch && matchesSystem && matchesZone;
    });

    countEl.textContent = `${filtered.length} of ${DATA.length} results`;

    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty">No matching equipment in this zone.</div>`;
      return;
    }

    listEl.innerHTML = filtered.map(item => `
      <div class="card">
        <div class="drawer">
          <span class="drawer-label">Drawer</span>
          <span class="drawer-number">${esc(item.drawer)}</span>
        </div>
        <div class="body">
          <div class="conn-head">
            <div class="conn">
              <span class="conn-tag">From</span>
              <span class="conn-from">${esc(item.source)}</span>
              <span class="conn-tag">To</span>
              <span class="conn-to">${esc(item.dest)}</span>
            </div>
            <span class="badge ${badgeClass[item.system] || ''}">${esc(item.system)}</span>
          </div>
          <div class="packet">
            <span class="packet-tag">Packet</span>
            <span class="packet-name">${esc(item.packet)}</span>
          </div>
        </div>
      </div>
    `).join("");
  }

  searchEl.addEventListener("input", render);
  filterEl.addEventListener("change", render);

  render();
</script>

</body>
</html>
